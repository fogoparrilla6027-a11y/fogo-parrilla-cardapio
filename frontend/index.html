<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fogo Parrilla - Itaúna/MG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Hero -->
  <header class="hero">
    <div class="user-info" id="userInfo"></div>
    <div class="auth-buttons">
      <button onclick="showAuthModal('login')" id="btnLogin">Entrar</button>
      <button onclick="showAuthModal('register')" id="btnRegister">Cadastrar</button>
      <button onclick="logout()" id="btnLogout" style="display:none">Sair</button>
    </div>
    <div class="hero-logo">Fogo <span>Parrilla</span></div>
    <div class="hero-subtitle">🔥 O verdadeiro sabor da parrilla</div>
    <div class="hero-stats">
      <span>📍 Av. Jove Soares, 1216 - Centro</span>
      <span>📅 Desde 2019</span>
      <span>🕐 Seg-Sáb: 11h-23h | Dom: 11h-16h</span>
    </div>
  </header>

  <!-- Category Navigation -->
  <nav class="nav-categories" id="categoryNav"></nav>

  <!-- Main Content -->
  <main class="container" id="mainContent"></main>

  <!-- Cart FAB -->
  <button class="cart-fab" onclick="toggleCart()" id="cartFab">
    🛒
    <span class="cart-fab-badge" id="cartBadge">0</span>
  </button>

  <!-- Cart Sidebar -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>🛒 Meu Pedido</h2>
      <button class="cart-close" onclick="toggleCart()">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">R$ 0,00</span>
      </div>
      <button class="btn-checkout" onclick="showCheckout()" id="btnCheckout" disabled>
        Continuar
      </button>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
